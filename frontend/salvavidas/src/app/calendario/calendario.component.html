<div class="page-container">
  <div class="page-header">
    <h1>🗓️ Calendario</h1>
    <button class="btn btn-primary">+ Agregar Evento</button>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <app-card
      icon="📅"
      title="Eventos Este Mes"
      value="18"
      subtitle="Actividades programadas"
      accentColor="primary">
    </app-card>
    <app-card
      icon="⏱"
      title="Próxima Semana"
      value="5"
      subtitle="Eventos programados"
      accentColor="success">
    </app-card>
    <app-card
      icon="🏷"
      title="Tipos de Eventos"
      value="5"
      subtitle="Diferentes categorías"
      accentColor="warning">
    </app-card>
  </div>

  <!-- Eventos List -->
  <section class="calendario-section">
    <h2>Eventos Próximos</h2>
    <div class="eventos-list">
      <div *ngFor="let evento of eventos()" class="evento-item">
        <div class="evento-date">
          <span class="day">{{ evento.fecha | date: 'dd' }}</span>
          <span class="month">{{ evento.fecha | date: 'MMM' }}</span>
        </div>
        <div class="evento-content">
          <div class="evento-header">
            <h3>{{ evento.titulo }}</h3>
            <span class="tipo-badge" [class]="getTipoBadgeClass(evento.tipo)">
              {{ evento.tipo }}
            </span>
          </div>
          <p class="descripcion">{{ evento.descripcion }}</p>
          <div class="evento-footer">
            <span class="hora">🕒 {{ evento.hora }}</span>
          </div>
        </div>
        <div class="evento-actions">
          <button class="btn-action" title="Editar">✎</button>
          <button class="btn-action delete" title="Eliminar">✕</button>
        </div>
      </div>
    </div>
  </section>
</div>
